## Vibe Payroll Time — local development stack (single-app default).
##
## Starts Postgres only. Backend and frontend run on the host via `npm run dev`
## so file watches and hot reload work natively without file-sync plumbing.
##
## Default ports follow the Vibe distribution convention so multiple Vibe apps
## can run side-by-side on the same dev workstation without colliding:
##   - Postgres → 5437 (was 5432)
##   - pgAdmin  → 5052 (was 5050)
## Override either via .env if you need the legacy port.
##
## For multi-app testing, layer the grouped overlay:
##   docker compose -f docker-compose.yml -f docker-compose.grouped.yml up --build

name: vibept-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibept-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibept}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibept_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vibept}
    ports:
      - '${POSTGRES_PUBLISH_PORT:-5437}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vibept} -d ${POSTGRES_DB:-vibept}']
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional — bring up with `docker compose --profile tools up -d`
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vibept-pgadmin
    profiles: ['tools']
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@vibept.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_PUBLISH_PORT:-5052}:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
