server {
  listen 8080 default_server;
  listen [::]:8080 default_server;

  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hide nginx version
  server_tokens off;

  # Gzip common text assets.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

  # Long-lived cache for hashed assets. Vite emits content-hashed
  # filenames so each build's bundle is safe to cache immutably forever.
  # Regex match so the rule applies whether the bundle is served at /
  # (single-app) or under a prefix like /payroll/ (multi-app overlay).
  location ~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker must never be cached or offline updates never ship.
  # Regex match handles single-app /sw.js and multi-app /payroll/sw.js
  # uniformly.
  location ~ /sw\.js$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    try_files $uri =404;
  }

  # SPA fallback — every non-file path serves index.html so React Router
  # wins. The fallback path is rewritten by frontend/Dockerfile at build
  # time: __SPA_INDEX__ becomes `/index.html` (single-app) or
  # `/payroll/index.html` (multi-app build with VITE_BASE_PATH=/payroll/).
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ __SPA_INDEX__;
  }

  # Soft deny for dotfiles.
  location ~ /\.(?!well-known) {
    deny all;
  }
}
