server {
  listen 8080 default_server;
  listen [::]:8080 default_server;

  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hide nginx version
  server_tokens off;

  # Gzip common text assets.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

  # Long-lived cache for hashed assets. Vite emits content-hashed
  # filenames so each build's bundle is safe to cache immutably forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker must never be cached or offline updates never ship.
  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    try_files $uri =404;
  }

  # SPA fallback — every non-file path serves index.html so React Router
  # wins. Always falls back to the on-disk /index.html regardless of
  # which prefix the SPA bundle was substituted with at startup. The
  # ingress (bundled Caddy in single-app, the vibe-installer's shared
  # Caddy in multi-app) is responsible for stripping any URL prefix
  # before forwarding requests here, so nginx serves the same disk
  # layout in either deployment shape.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  # Soft deny for dotfiles.
  location ~ /\.(?!well-known) {
    deny all;
  }
}
