name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    name: typecheck + lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  test:
    name: unit + integration tests
    runs-on: ubuntu-latest
    services:
      # Postgres exposed on 5437 to match the dev convention so vitest
      # config's default POSTGRES_PORT (5437) connects without overrides.
      # The integration tests connect to vibept_test (created below);
      # backend/vitest.config.ts hard-defaults POSTGRES_DB_TEST=vibept_test.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vibept
          POSTGRES_PASSWORD: vibept_dev
          POSTGRES_DB: vibept
        ports:
          - 5437:5432
        options: >-
          --health-cmd "pg_isready -U vibept -d vibept"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      JWT_SECRET: ci-jwt-secret-placeholder-0123456789abcdef0123456789abcdef
      SECRETS_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MIGRATIONS_AUTO: 'false'
      WORKERS_ENABLED: 'false'
      NODE_ENV: test
      # vitest.config.ts assembles its own DATABASE_URL pointing at
      # vibept_test on POSTGRES_PORT (default 5437). Mirror those here so
      # ad-hoc steps below (psql, migrate) talk to the same database the
      # tests will use. Asserting via assert-test-db.ts requires the DB
      # name to end in `_test`.
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5437'
      POSTGRES_USER: vibept
      POSTGRES_PASSWORD: vibept_dev
      POSTGRES_DB_TEST: vibept_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Create the dedicated test database. Without this every integration
      # test silently SKIPs (each file probes `select 1` and bails on
      # failure) and the suite reports green on a hidden hole.
      - name: Create test database
        env:
          PGPASSWORD: vibept_dev
        run: |
          psql -h localhost -p 5437 -U vibept -d vibept \
            -c 'CREATE DATABASE vibept_test;'
      - name: Apply migrations to test database
        # `knexfile.cjs`'s `test` env appends `_test` to whatever
        # DATABASE_URL points at, so passing DATABASE_URL=...vibept_test
        # would migrate `vibept_test_test`. Pass DATABASE_URL_TEST
        # (which short-circuits the suffix logic) so knex uses the
        # given URL verbatim.
        env:
          DATABASE_URL_TEST: postgres://vibept:vibept_dev@localhost:5437/vibept_test
        run: npm run migrate --workspace=backend
      - run: npm test

  # Build + push api and web images to GHCR. Gated on check + test so a
  # broken main never publishes. Runs only on push to main or tag push —
  # pull requests still build through the consumer side but don't publish
  # to avoid leaking fork-authored images into the canonical registry.
  #
  # Image names follow the Vibe distribution convention:
  # vibe-payroll-{api,web} (vibe-distribution-plan.md).
  publish-images:
    name: publish images (ghcr.io)
    needs: [check, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Fan out the two images in parallel. Each matrix leg is an
      # independent docker build; failing one does not cancel the
      # other so a partial publish is still useful.
      fail-fast: false
      matrix:
        include:
          - name: api
            image: vibe-payroll-api
            dockerfile: backend/Dockerfile
          - name: web
            image: vibe-payroll-web
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # Registry uses the lowercased repo owner so both `KisaesDevLab`
      # (old casing) and `kisaesdevlab` (lowercased) resolve the same
      # way. Matches the image names already in docker-compose.prod.yml.
      - name: Compute lowercased image path
        id: img
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/$OWNER_LC/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Canonical tag set:
      #   - main branch push  → :main, :sha-<shortsha>
      #   - tag push vX.Y.Z   → :X.Y.Z, :X.Y, :X, :latest
      #   - workflow_dispatch → :<branch>, :sha-<shortsha>
      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Vibe Payroll Time — ${{ matrix.name }}
            org.opencontainers.image.description=Self-hosted multi-tenant employee time tracking appliance (${{ matrix.name }} image).
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=SEE LICENSE IN LICENSE

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          # GMKtec NucBox M6 (reference hardware) is x86_64. Add
          # linux/arm64 here when a customer asks — arm64 cross-build
          # via QEMU adds ~5-10 min to this job and isn't used by any
          # current deployment target.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_started_at }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
