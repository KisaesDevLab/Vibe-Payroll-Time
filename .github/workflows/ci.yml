name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    name: typecheck + lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  test:
    name: unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vibept
          POSTGRES_PASSWORD: vibept_dev
          POSTGRES_DB: vibept
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vibept -d vibept"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://vibept:vibept_dev@localhost:5432/vibept
      JWT_SECRET: ci-jwt-secret-placeholder-0123456789abcdef0123456789abcdef
      SECRETS_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MIGRATE_ON_BOOT: 'false'
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Build + push backend and frontend images to GHCR. Gated on check +
  # test so a broken main never publishes. Runs only on push to main or
  # tag push — pull requests still build through the consumer side but
  # don't publish to avoid leaking fork-authored images into the
  # canonical registry.
  publish-images:
    name: publish images (ghcr.io)
    needs: [check, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Fan out the two images in parallel. Each matrix leg is an
      # independent docker build; failing one does not cancel the
      # other so a partial publish is still useful.
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: vibept-backend
            dockerfile: backend/Dockerfile
          - name: frontend
            image: vibept-frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # Registry uses the lowercased repo owner so both `KisaesDevLab`
      # (old casing) and `kisaesdevlab` (lowercased) resolve the same
      # way. Matches the image names already in docker-compose.prod.yml.
      - name: Compute lowercased image path
        id: img
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/$OWNER_LC/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Canonical tag set:
      #   - main branch push  → :main, :sha-<shortsha>
      #   - tag push vX.Y.Z   → :X.Y.Z, :X.Y, :X, :latest
      #   - workflow_dispatch → :<branch>, :sha-<shortsha>
      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Vibe Payroll Time — ${{ matrix.name }}
            org.opencontainers.image.description=Self-hosted multi-tenant employee time tracking appliance (${{ matrix.name }} image).
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=SEE LICENSE IN LICENSE

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          # GMKtec NucBox M6 (reference hardware) is x86_64. Add
          # linux/arm64 here when a customer asks — arm64 cross-build
          # via QEMU adds ~5-10 min to this job and isn't used by any
          # current deployment target.
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_started_at }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
