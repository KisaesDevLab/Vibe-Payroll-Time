name: docker-publish

# Build + push api and web images to GHCR. Two-image matrix mirroring
# Vibe-Tax-Research-Chat's release.yml — fail-fast off so a failed api
# build doesn't cancel the web build (and vice versa). The
# vibe-installer's apps/payroll stack pulls these tags via env-pinned
# IMAGE_TAG knobs.
#
# Image names: Phase 14 standardizes on vibe-payroll-time-{server,client}
# for cross-app uniformity with sibling Vibe apps. The legacy
# vibe-payroll-{api,web} tags continue to publish in parallel for one
# minor-release cycle so anyone who already pulled doesn't break.
#   vibe-payroll-time-server / vibe-payroll-api — Express + Knex + BullMQ
#   vibe-payroll-time-client / vibe-payroll-web — nginx-served Vite SPA
#
# After the deprecation window, drop the api/web entries from the
# matrix.
#
# Triggers:
#   - push to main      → :main, :sha-<shortsha>, :latest (rolling)
#   - tag push vX.Y.Z   → :X.Y.Z, :X.Y, :X, :latest
#   - workflow_dispatch → :<branch>, :sha-<shortsha>
#
# Pull requests build via ci.yml's typecheck/lint but never publish, so
# fork-authored images never land in the canonical registry.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  publish-images:
    name: publish images (ghcr.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each matrix entry builds ONE image and pushes it under TWO
          # repo paths (canonical Phase 14 name + legacy alias). Same
          # digest under both. Drop the legacy `image_legacy` after the
          # deprecation cycle.
          - name: server
            image: vibe-payroll-time-server
            image_legacy: vibe-payroll-api
            dockerfile: backend/Dockerfile
          - name: client
            image: vibe-payroll-time-client
            image_legacy: vibe-payroll-web
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # GHCR is case-sensitive on the namespace; KisaesDevLab → kisaesdevlab.
      - name: Compute lowercased image paths
        id: img
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/$OWNER_LC/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "ref_legacy=ghcr.io/$OWNER_LC/${{ matrix.image_legacy }}" >> "$GITHUB_OUTPUT"

      # Phase 14 — multi-arch builds (amd64 + arm64). Apple-Silicon
      # developers and Raspberry-Pi-class appliances now get native
      # binaries instead of QEMU-emulated x86_64. QEMU adds ~5-10 min
      # per build but we accept the cost for parity with sibling Vibe
      # apps' release pipeline.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Push to BOTH the canonical and legacy repo paths in one
          # build. metadata-action expands each `tags:` entry across
          # every `images:` ref, so a vX.Y.Z release tag publishes
          # vibe-payroll-time-server:X.Y.Z AND vibe-payroll-api:X.Y.Z
          # from the same digest.
          images: |
            ${{ steps.img.outputs.ref }}
            ${{ steps.img.outputs.ref_legacy }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Vibe Payroll Time — ${{ matrix.name }}
            org.opencontainers.image.description=Self-hosted multi-tenant time-tracking appliance (${{ matrix.name }} image).
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=SEE LICENSE IN LICENSE

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_started_at }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
